<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecuaciones con Módulo - 5to Año</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <h1>Ecuaciones con Módulo</h1>

        <div id="seccion-acceso" class="acceso-box">
            <input type="text" id="codigo-acceso" placeholder="Código (ej: 5toAB)">
            <button onclick="verificarCodigo()">Activar PRO</button>
        </div>

        <hr>

        <div class="panel-controles">
            
            <div class="control-group">
                <label>Coeficiente <b>a</b>: <span id="val-a-display" class="badge">1</span></label>
                <input type="range" id="val-a" min="-10" max="10" step="0.5" value="1">
            </div>

            <div class="control-group">
                <label>Coeficiente <b>b</b>: <span id="val-b-display" class="badge">1</span></label>
                <input type="range" id="val-b" min="-10" max="10" step="0.5" value="1">
            </div>

            <div class="control-group">
                <label>Desplazamiento <b>h</b>: <span id="val-h-display" class="badge">0</span></label>
                <input type="range" id="id-h" min="-20" max="20" step="1" value="0">
            </div>

            <div class="control-group">
                <label>Igualado a <b>e</b>: <span id="val-e-display" class="badge">5</span></label>
                <input type="range" id="val-e" min="-20" max="20" step="1" value="5">
            </div>

            <div class="control-group controles-pro" style="display: none;">
                <label>Parámetro <b>k</b>: <span id="val-k-display" class="badge">0</span></label>
                <input type="range" id="val-k" min="-20" max="20" step="1" value="0">
            </div>

        </div>

        <div class="resultado-container">
            <h3>Resultado:</h3>
            <div id="display-resultado" class="resultado-texto">
                Esperando valores...
            </div>
        </div>

        <button class="btn-whatsapp" onclick="compartirWhatsApp()">
            Compartir por WhatsApp
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
