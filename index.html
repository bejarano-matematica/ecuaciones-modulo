<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ecuaciones con Módulo - App Móvil</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { display: flex; flex-direction: column; align-items: center; background-color: #f4f7f6; color: #2c3e50; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; touch-action: manipulation; overscroll-behavior-y: none; }
        
        .nav-tabs { display: flex; width: 100%; max-width: 950px; margin-bottom: 10px; background: #ddd; border-radius: 8px; padding: 5px; }
        .tab-link { flex: 1; padding: 10px; border: none; background: none; font-weight: bold; cursor: pointer; border-radius: 5px; transition: 0.3s; font-size: 0.9em; }
        .tab-link.active { background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); color: #2980b9; }

        .freemium-bar { display: flex; justify-content: center; gap: 10px; width: 100%; max-width: 950px; margin-bottom: 15px; }
        .btn-mode { flex: 1; padding: 10px; border-radius: 8px; border: 2px solid transparent; font-weight: bold; cursor: pointer; transition: 0.3s; background: #e0e6ed; color: #7f8c8d; }
        .btn-mode.active-free { background: #34495e; color: white; border-color: #2c3e50; }
        .btn-mode.active-pro { background: #f1c40f; color: #8e44ad; border-color: #f39c12; }
        
        .panel { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 100%; max-width: 950px; }
        .formula-ref { background: #2c3e50; color: #ecf0f1; padding: 10px; border-radius: 8px; text-align: center; font-family: monospace; font-size: 1.1em; margin-bottom: 20px; word-wrap: break-word; }
        
        .controls { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
        .control-group { display: flex; flex-direction: column; align-items: center; font-size: 0.8em; font-weight: bold; flex: 1 1 calc(33% - 10px); min-width: 80px; }
        input[type="range"] { width: 100%; }
        
        .locked { opacity: 0.3; pointer-events: none; filter: grayscale(100%); }
        
        .tab-content { display: none; width: 100%; }
        .tab-content.active { display: block; }

        .math-box { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 768px) { .math-box { grid-template-columns: 1fr 1fr; } }
        
        .case { padding: 15px; border-radius: 10px; border-top: 4px solid #3498db; background: #ebf5fb; font-size: 0.85em; line-height: 1.4; display: flex; flex-direction: column; }
        .case.neg { border-top-color: #e74c3c; background: #fdedec; }
        .condicion-despeje { background: rgba(255,255,255,0.7); padding: 8px; border-radius: 5px; margin: 10px 0; font-family: monospace; border: 1px dashed #aaa; text-align: center; }
        
        .btn-validar { cursor: pointer; padding: 12px; border-radius: 8px; border: none; font-weight: bold; margin-top: 15px; width: 100%; }
        .btn-espera { background: #f39c12; color: white; }
        .btn-error { background: #e74c3c; color: white; }
        .btn-exito { background: #27ae60; color: white; }
        
        #canvas-container { width: 100%; display: flex; justify-content: center; margin-top: 10px;}
        canvas { border: 1px solid #ccc; border-radius: 10px; background: white; width: 100% !important; height: auto !important; }
        
        .step-math { font-family: monospace; background: rgba(255,255,255,0.6); padding: 10px; border-radius: 5px; margin-bottom: 10px; border-left: 3px solid #3498db; }
        .case.neg .step-math { border-left-color: #e74c3c; }
        
        #conclusion-panel { display: none; margin-top: 20px; padding: 15px; background: #e8f8f5; border: 2px solid #1abc9c; border-radius: 10px; text-align: center; font-size: 1.2em; color: #16a085; }
    </style>
</head>
<body>

<div class="nav-tabs">
    <button class="tab-link active" onclick="openTab(event, 'pantallaCalculos')">🔢 Cálculos Paso a Paso</button>
    <button class="tab-link" onclick="openTab(event, 'pantallaGraficos')">📈 Recta Numérica</button>
</div>

<div class="freemium-bar">
    <button id="btnBásico" class="btn-mode active-free" onclick="setModo('basico')">Básico</button>
    <button id="btnPro" class="btn-mode" onclick="intentarDesbloquearPro()">👑 PRO</button>
</div>

<div class="panel">
    <div class="formula-ref" id="formulaRef">Ecuación: a |bx - h| = e</div>
    
    <div class="controls">
        <div class="control-group"><label>a</label><input type="range" id="slA" min="-10" max="10" step="0.5" value="2"><span id="vA"></span></div>
        <div class="control-group"><label>b</label><input type="range" id="slB" min="-10" max="10" step="0.5" value="3"><span id="vB"></span></div>
        <div class="control-group"><label>h</label><input type="range" id="slH" min="-10" max="10" step="0.5" value="5"><span id="vH"></span></div>
        <div class="control-group locked" id="grpK"><label>k 👑</label><input type="range" id="slK" min="-10" max="10" step="0.5" value="0"><span id="vK"></span></div>
        <div class="control-group locked" id="grpN"><label>n 👑</label><input type="range" id="slN" min="-10" max="10" step="0.5" value="0"><span id="vN"></span></div>
        <div class="control-group"><label>e</label><input type="range" id="slE" min="-10" max="10" step="0.5" value="7"><span id="vE"></span></div>
        <div class="control-group locked" id="grpM"><label>m 👑</label><input type="range" id="slM" min="-10" max="10" step="0.5" value="0"><span id="vM"></span></div>
    </div>

    <div style="font-size: 1.5em; text-align: center; margin: 15px 0; color: #2980b9;">
        <strong><span id="eqActual"></span></strong>
    </div>

    <div id="pantallaCalculos" class="tab-content active">
        <div class="math-box">
            <div class="case">
                <strong>Caso 1: Parte Positiva (≥ 0)</strong>
                <div class="condicion-despeje" id="despejeC1"></div>
                <div id="step1" class="step-math"></div>
                <button id="btn1" class="btn-validar btn-espera" onclick="verificar(1)">Validar Caso 1</button>
            </div>
            <div class="case neg">
                <strong>Caso 2: Parte Negativa (< 0)</strong>
                <div class="condicion-despeje" id="despejeC2"></div>
                <div id="step2" class="step-math"></div>
                <button id="btn2" class="btn-validar btn-espera" onclick="verificar(2)">Validar Caso 2</button>
            </div>
        </div>
        <div id="conclusion-panel">
            <strong>Solución Final:</strong> <span id="solucion-final-text"></span>
        </div>
    </div>

    <div id="pantallaGraficos" class="tab-content">
        <p style="text-align:center; font-size: 0.9em; color: #7f8c8d; margin-top:0;">Visualiza la validez de los puntos</p>
        <div id="canvas-container"></div>
    </div>
</div>

<script>
let escala = 30, centroX;
let resX1 = null, resX2 = null;
let esValida1 = false, esValida2 = false;
let validado1 = false, validado2 = false;
let modoProActivo = false;

function openTab(evt, tabName) {
    let i, tabcontent, tablinks;
    tabcontent = document.getElementsByClassName("tab-content");
    for (i = 0; i < tabcontent.length; i++) { tabcontent[i].style.display = "none"; }
    tablinks = document.getElementsByClassName("tab-link");
    for (i = 0; i < tablinks.length; i++) { tablinks[i].className = tablinks[i].className.replace(" active", ""); }
    document.getElementById(tabName).style.display = "block";
    evt.currentTarget.className += " active";
}

function setModo(modo) {
    let slK = document.getElementById('slK'), slN = document.getElementById('slN'), slM = document.getElementById('slM');
    if (modo === 'basico') {
        modoProActivo = false;
        document.getElementById('btnBásico').className = "btn-mode active-free";
        document.getElementById('btnPro').className = "btn-mode";
        document.getElementById('formulaRef').innerText = "Ecuación: a |bx - h| = e";
        slK.value = 0; slN.value = 0; slM.value = 0;
        slK.disabled = true; slN.disabled = true; slM.disabled = true;
        document.getElementById('grpK').classList.add('locked');
        document.getElementById('grpN').classList.add('locked');
        document.getElementById('grpM').classList.add('locked');
    } else {
        modoProActivo = true;
        document.getElementById('btnBásico').className = "btn-mode";
        document.getElementById('btnPro').className = "btn-mode active-pro";
        document.getElementById('formulaRef').innerText = "Ecuación: a |bx - h| + k + nx = e + mx";
        slK.disabled = false; slN.disabled = false; slM.disabled = false;
        document.getElementById('grpK').classList.remove('locked');
        document.getElementById('grpN').classList.remove('locked');
        document.getElementById('grpM').classList.remove('locked');
    }
    resetBotones();
}

function intentarDesbloquearPro() {
    if(modoProActivo) return;
    let pass = prompt("Código PRO:");
    if (pass === "IamBatman2026") { setModo('pro'); }
}

function setup() {
    let c = createCanvas(950, 220); 
    c.parent('canvas-container');
    centroX = width / 2;
}

function draw() {
    background(255);
    let a = parseFloat(document.getElementById('slA').value);
    let b_real = parseFloat(document.getElementById('slB').value);
    let b_calc = b_real === 0 ? 0.00001 : b_real;
    let h = parseFloat(document.getElementById('slH').value);
    let k = parseFloat(document.getElementById('slK').value);
    let n = parseFloat(document.getElementById('slN').value);
    let e = parseFloat(document.getElementById('slE').value);
    let m = parseFloat(document.getElementById('slM').value);

    document.querySelectorAll('.controls span').forEach(s => {
        let id = s.id.replace('v', 'sl');
        s.innerText = document.getElementById(id).value;
    });

    let bText = b_real === 0 ? "0" : (b_real === 1 ? "" : (b_real === -1 ? "-" : b_real));
    let hSign = h >= 0 ? "-" : "+";
    let hAbs = Math.abs(h);
    let kSign = k >= 0 ? "+" : "-";
    let kAbs = Math.abs(k);
    let nPart = n === 0 ? "" : (n > 0 ? ` + ${n}x` : ` - ${Math.abs(n)}x`);
    let mPart = m === 0 ? "" : (m > 0 ? ` + ${m}x` : ` - ${Math.abs(m)}x`);
    let aText = a === 1 ? "" : (a === -1 ? "-" : a);
    let eqK = (!modoProActivo || k === 0) ? "" : ` ${kSign} ${kAbs}`;
    
    document.getElementById('eqActual').innerText = `${aText}|${bText}x ${hSign} ${hAbs}|${eqK}${nPart} = ${e}${mPart}`;

    if (b_real === 0) {
        document.getElementById('despejeC1').innerHTML = "No es lineal";
        document.getElementById('despejeC2').innerHTML = "-";
        return;
    }

    let hCritico = h / b_calc;
    let bPos = b_calc > 0;
    let ineq1 = bPos ? "≥" : "≤";
    let ineq2 = bPos ? "<" : ">";

    // --- RESTAURANDO DESPEJES DE CONDICIÓN ---
    let cond1HTML = `${b_real}x ${hSign} ${hAbs} ≥ 0<br>${b_real}x ≥ ${h}<br>`;
    cond1HTML += `x ${ineq1} ${h}/${b_real}<br><span style="color:green">x ${ineq1} ${hCritico.toFixed(2)}</span>`;
    document.getElementById('despejeC1').innerHTML = cond1HTML;

    let cond2HTML = `${b_real}x ${hSign} ${hAbs} < 0<br>${b_real}x < ${h}<br>`;
    cond2HTML += `x ${ineq2} ${h}/${b_real}<br><span style="color:green">x ${ineq2} ${hCritico.toFixed(2)}</span>`;
    document.getElementById('despejeC2').innerHTML = cond2HTML;

    // --- RESTAURANDO DESPEJES DE ECUACIÓN ---
    // Caso 1
    let den1 = (a * b_calc) + n - m;
    let num1 = e - k + (a * h);
    if (den1 !== 0) {
        resX1 = num1 / den1;
        esValida1 = bPos ? (resX1 >= hCritico - 0.001) : (resX1 <= hCritico + 0.001);
        
        let txt1 = `${a}(${b_real}x ${hSign} ${hAbs}) ${eqK}${nPart} = ${e}${mPart}<br>`;
        txt1 += `${(a*b_real).toFixed(1)}x ${a * -h >= 0 ? '+':''}${(a*-h).toFixed(1)} ${eqK}${nPart} = ${e}${mPart}<br>`;
        txt1 += `${den1.toFixed(1)}x = ${num1.toFixed(1)}<br><strong>x₁ = ${resX1.toFixed(2)}</strong>`;
        document.getElementById('step1').innerHTML = txt1;
    }

    // Caso 2
    let den2 = (-a * b_calc) + n - m;
    let num2 = e - k - (a * h);
    if (den2 !== 0) {
        resX2 = num2 / den2;
        esValida2 = bPos ? (resX2 < hCritico + 0.001) : (resX2 > hCritico - 0.001);

        let txt2 = `${a}[-(${b_real}x ${hSign} ${hAbs})] ${eqK}${nPart} = ${e}${mPart}<br>`;
        txt2 += `${(-a*b_real).toFixed(1)}x ${-a * -h >= 0 ? '+':''}${( -a * -h).toFixed(1)} ${eqK}${nPart} = ${e}${mPart}<br>`;
        txt2 += `${den2.toFixed(1)}x = ${num2.toFixed(1)}<br><strong>x₂ = ${resX2.toFixed(2)}</strong>`;
        document.getElementById('step2').innerHTML = txt2;
    }

    dibujarRecta(1, 70, hCritico, resX1, `Validez Caso 1`, "#3498db", "x₁", bPos);
    dibujarRecta(2, 160, hCritico, resX2, `Validez Caso 2`, "#e74c3c", "x₂", bPos);
    chequearSolucionFinal();
}

function dibujarRecta(caso, y, hCritico, xVal, titulo, colorPunto, labelPunto, bPos) {
    fill(100); noStroke(); textAlign(LEFT); textSize(12); text(titulo, 20, y - 35);
    stroke(200); line(40, y, width-40, y);
    for(let i=-15; i<=15; i++) {
        let px = centroX + i*escala;
        line(px, y-5, px, y+5);
        if(i % 5 === 0) { noStroke(); fill(150); text(i, px-5, y+18); stroke(200); }
    }
    let pxCritico = centroX + hCritico * escala;
    strokeWeight(4); stroke(46, 204, 113, 180); 
    let vaDerecha = (caso === 1 && bPos) || (caso === 2 && !bPos);
    if (vaDerecha) line(pxCritico, y, width - 40, y); else line(pxCritico, y, 40, y);
    strokeWeight(1); fill(caso === 1 ? 46 : 255); stroke(46, 204, 113);
    ellipse(pxCritico, y, 10, 10);
    if(xVal !== null) {
        let pxSol = centroX + xVal * escala;
        fill(colorPunto); noStroke(); ellipse(pxSol, y, 12, 12);
        fill(50); text(labelPunto, pxSol-5, y-15);
    }
}

function verificar(caso) {
    if(caso === 1) {
        validado1 = true;
        document.getElementById('btn1').className = esValida1 ? "btn-validar btn-exito" : "btn-validar btn-error";
        document.getElementById('btn1').innerText = esValida1 ? "CORRECTO" : "FUERA DE RANGO";
    } else {
        validado2 = true;
        document.getElementById('btn2').className = esValida2 ? "btn-validar btn-exito" : "btn-validar btn-error";
        document.getElementById('btn2').innerText = esValida2 ? "CORRECTO" : "FUERA DE RANGO";
    }
}

function chequearSolucionFinal() {
    if (validado1 && validado2) {
        let sol = [];
        if(esValida1) sol.push(resX1.toFixed(2));
        if(esValida2) sol.push(resX2.toFixed(2));
        sol.sort((a,b)=>a-b);
        document.getElementById('solucion-final-text').innerText = sol.length ? `{ ${sol.join(" ; ")} }` : "∅";
        document.getElementById('conclusion-panel').style.display = 'block';
    }
}

function resetBotones() {
    validado1 = false; validado2 = false;
    document.getElementById('conclusion-panel').style.display = "none";
    document.getElementById('btn1').className = "btn-validar btn-espera"; document.getElementById('btn1').innerText = "Validar Caso 1";
    document.getElementById('btn2').className = "btn-validar btn-espera"; document.getElementById('btn2').innerText = "Validar Caso 2";
}
document.querySelectorAll('input').forEach(i => i.oninput = resetBotones);
</script>
</body>
</html>
