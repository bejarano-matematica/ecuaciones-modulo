<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecuaciones con Módulo - 5to Año</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Resolución de Ecuaciones con Módulo</h1>

        <div id="seccion-acceso">
            <input type="text" id="codigo-acceso" placeholder="Código de curso (ej: 5toAB)">
            <button onclick="verificarCodigo()">Activar Modo PRO</button>
        </div>

        <hr>

        <div class="controles">
            <div class="control-group">
                <label>Coeficiente <b>a</b>: <span id="val-a-display">1</span></label>
                <input type="range" id="val-a" min="-10" max="10" step="0.5" value="1">
            </div>

            <div class="control-group">
                <label>Coeficiente <b>b</b>: <span id="val-b-display">1</span></label>
                <input type="range" id="val-b" min="-10" max="10" step="0.5" value="1">
            </div>

            <div class="control-group">
                <label>Desplazamiento <b>h</b>: <span id="val-h-display">0</span></label>
                <input type="range" id="val-h" min="-20" max="20" step="1" value="0">
            </div>

            <div class="control-group">
                <label>Igualado a <b>e</b>: <span id="val-e-display">5</span></label>
                <input type="range" id="val-e" min="-20" max="20" step="1" value="5">
            </div>

            <div class="control-group controles-pro" style="display: none;">
                <label>Parámetro <b>k</b>: <span id="val-k-display">0</span></label>
                <input type="range" id="val-k" min="-20" max="20" step="1" value="0">
            </div>
        </div>

        <div class="resultado-box">
            <h3>Resultado:</h3>
            <div id="display-resultado">Mueva los deslizadores para calcular</div>
        </div>

        <button class="btn-whatsapp" onclick="compartirWhatsApp()">Compartir por WhatsApp</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
