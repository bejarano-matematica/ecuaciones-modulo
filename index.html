<!DOCTYPE html>
<html lang="es">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-BTCERXHYET"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-BTCERXHYET');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ecuaciones con módulo - Prof. Bejarano</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
</head>
<body>

<div class="nav-tabs">
    <button class="tab-link active" onclick="openTab(event, 'pantallaCalculos')">🔢 Cálculos</button>
    <button class="tab-link" onclick="openTab(event, 'pantallaGraficos')">📈 Gráfico</button>
</div>

<div class="freemium-bar">
    <button id="btnBásico" class="btn-mode active-free" onclick="setModo('basico')">Básico</button>
    <button id="btnPro" class="btn-mode" onclick="intentarDesbloquearPro()">👑 PRO</button>
</div>

<div id="area-ingreso-pro" style="display: none; margin-bottom: 15px; padding: 15px; background: #fff3cd; border-radius: 12px; border: 2px dashed #f1c40f; text-align: center;">
    <p>Código de 5to A y B:</p>
    <input type="text" id="input-codigo-pro" placeholder="Ingresá 5toAB...">
    <br><br>
    <button class="btn-validar btn-exito" style="width: auto; padding: 10px 20px;" onclick="verificarCodigoPro()">Validar</button>
    <button class="btn-validar btn-espera" style="width: auto; padding: 10px 20px;" onclick="cancelarPro()">Cerrar</button>
    <p id="mensaje-error-pro" style="display: none; color: #d32f2f; font-weight: bold; margin-top: 10px;">❌ Código incorrecto</p>
</div>

<div class="panel">
    <div class="formula-ref" id="formulaRef">Ecuación: a |bx - h| = e</div>
    
    <div class="controls">
        <div class="control-group"><label>a</label><input type="range" id="slA" min="-10" max="10" step="0.5" value="2"><span id="vA"></span></div>
        <div class="control-group"><label>b</label><input type="range" id="slB" min="-10" max="10" step="0.5" value="1"><span id="vB"></span></div>
        <div class="control-group"><label>h</label><input type="range" id="slH" min="-10" max="10" step="0.5" value="5"><span id="vH"></span></div>
        <div class="control-group locked" id="grpK"><label>k 👑</label><input type="range" id="slK" min="-10" max="10" step="0.5" value="0"><span id="vK"></span></div>
        <div class="control-group locked" id="grpN"><label>n 👑</label><input type="range" id="slN" min="-10" max="10" step="0.5" value="0"><span id="vN"></span></div>
        <div class="control-group"><label>e</label><input type="range" id="slE" min="-10" max="10" step="0.5" value="7"><span id="vE"></span></div>
        <div class="control-group locked" id="grpM"><label>m 👑</label><input type="range" id="slM" min="-10" max="10" step="0.5" value="0"><span id="vM"></span></div>
    </div>

    <div style="font-size: 1.3em; text-align: center; margin: 15px 0; color: #2980b9;">
        <strong><span id="eqActual"></span></strong>
    </div>

    <div id="pantallaCalculos" class="tab-content active">
        <div class="math-box">
            <div class="case">
                <strong>Caso 1 (+)</strong>
                <div class="condicion-despeje" id="despejeC1"></div>
                <div id="step1" class="step-math"></div>
                <button id="btn1" class="btn-validar btn-espera" onclick="verificar(1)">Validar 1</button>
            </div>
            <div class="case neg">
                <strong>Caso 2 (-)</strong>
                <div class="condicion-despeje" id="despejeC2"></div>
                <div id="step2" class="step-math"></div>
                <button id="btn2" class="btn-validar btn-espera" onclick="verificar(2)">Validar 2</button>
            </div>
        </div>
        <div id="conclusion-panel">
            <strong>Solución:</strong> <span id="solucion-final-text"></span>
        </div>
    </div>

    <div id="pantallaGraficos" class="tab-content">
        <div id="canvas-container"></div>
    </div>

    <button onclick="compartirWhatsApp()" style="width: 100%; margin-top: 20px; padding: 15px; background: #25D366; color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 1.1em; cursor: pointer;">
        Compartir por WhatsApp 📱
    </button>
</div>

<script src="script.js"></script>
</body>
</html>
